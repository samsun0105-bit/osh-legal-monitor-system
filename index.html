<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>職安法規自動監控與鑑別系統 v4.0</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background-color: #f8fafc;
        }
        @keyframes scan {
            0% { transform: translateY(-100%); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: translateY(100%); opacity: 0; }
        }
        .scan-line {
            height: 2px;
            background: linear-gradient(to right, transparent, #3b82f6, transparent);
            animation: scan 2s linear infinite;
        }
        .fade-in {
            animation: fadeIn 0.4s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* 恢復紫色發光外框效果 */
        .law-card-glow {
            border: 2px solid #e0d7ff; /* 淡紫色邊框 */
            background-color: #ffffff;
            box-shadow: 0 0 15px rgba(224, 215, 255, 0.6); /* 紫色發光陰影 */
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .law-card-glow:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 25px rgba(224, 215, 255, 0.9);
            border-color: #d1c4ff;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const App = () => {
            const [activeTab, setActiveTab] = useState('monitor');
            const [isSyncing, setIsSyncing] = useState(false);
            const [selectedLaw, setSelectedLaw] = useState(null);

            // 匯入完整的 28 項法規清單與對應日期
            const initialLaws = [
                { id: 1, name: '職業安全衛生法', type: '法律', remoteDate: '2025-12-19', status: 'conflict' },
                { id: 2, name: '職業安全衛生法施行細則', type: '法規命令', remoteDate: '2020-02-27', status: 'latest' },
                { id: 3, name: '職業安全衛生管理辦法', type: '法規命令', remoteDate: '2022-01-05', status: 'latest' },
                { id: 4, name: '職業安全衛生設施規則', type: '法規命令', remoteDate: '2024-08-01', status: 'latest' },
                { id: 5, name: '職業安全衛生教育訓練規則', type: '法規命令', remoteDate: '2025-09-04', status: 'latest' },
                { id: 6, name: '職業安全衛生標示設置準則', type: '法規命令', remoteDate: '2014-07-02', status: 'latest' },
                { id: 7, name: '勞工作業環境監測實施辦法', type: '法規命令', remoteDate: '2016-11-02', status: 'latest' },
                { id: 8, name: '勞工作業場所容許暴露標準', type: '法規命令', remoteDate: '2025-04-11', status: 'latest' },
                { id: 9, name: '有機溶劑中毒預防規則', type: '法規命令', remoteDate: '2025-05-14', status: 'latest' },
                { id: 10, name: '危害性化學品標示及通識規則', type: '法規命令', remoteDate: '2018-11-09', status: 'latest' },
                { id: 11, name: '勞工健康保護規則', type: '法規命令', remoteDate: '2021-12-22', status: 'latest' },
                { id: 12, name: '女性勞工母性健康保護實施辦法', type: '法規命令', remoteDate: '2024-05-31', status: 'latest' },
                { id: 13, name: '妊娠與分娩後女性及未滿十八歲勞工禁止從事危險性或有害性工作認定標準', type: '行政規則', remoteDate: '2025-11-20', status: 'latest' },
                { id: 14, name: '精密作業勞工視機能保護設施標準', type: '法規命令', remoteDate: '2014-03-30', status: 'latest' },
                { id: 15, name: '工業用機器人危害預防標準', type: '法規命令', remoteDate: '2018-02-14', status: 'latest' },
                { id: 16, name: '鍋爐及壓力容器安全規則', type: '法規命令', remoteDate: '2014-07-01', status: 'latest' },
                { id: 17, name: '游離輻訴防護法', type: '法律', remoteDate: '2002-01-30', status: 'latest' },
                { id: 18, name: '游離輻訴防護法施行細則', type: '法規命令', remoteDate: '2008-02-22', status: 'latest' },
                { id: 19, name: '游離輻訴防護安全標準', type: '法規命令', remoteDate: '2005-12-30', status: 'latest' },
                { id: 20, name: '放射性物質與可發生游離輻訴設備及其輻訴作業管理辦法', type: '法規命令', remoteDate: '2018-12-22', status: 'latest' },
                { id: 21, name: '放射性物質或可發生游離輻訴設備操作人員管理辦法', type: '法規命令', remoteDate: '2009-04-17', status: 'latest' },
                { id: 22, name: '事業單位僱用女性勞工夜間工作場所必要之安全衛生設施標準', type: '法規命令', remoteDate: '2015-03-31', status: 'latest' },
                { id: 23, name: '機械設備器具安全標準', type: '法規命令', remoteDate: '2022-05-11', status: 'latest' },
                { id: 24, name: '勞動基準法', type: '法律', remoteDate: '2024-07-31', status: 'conflict' },
                { id: 25, name: '勞工職業災害保險及保護法', type: '法律', remoteDate: '2021-04-30', status: 'latest' },
                { id: 26, name: '勞工職業災害保險及保護法施行細則', type: '法規命令', remoteDate: '2025-05-29', status: 'latest' },
                { id: 27, name: '勞工職業災害保險及保護法第十條規定參加保險辦法', type: '法規命令', remoteDate: '2022-03-09', status: 'latest' },
                { id: 28, name: '缺氧症預防規則', type: '法規命令', remoteDate: '2014-06-26', status: 'latest' }
            ];

            const getComparisonData = (lawName) => {
                if (lawName === '職業安全衛生法') {
                    return [
                        { article: '第 15-1 條 (新增)', oldText: '（無規定）', newText: '一定規模以上工程之業主應於規劃設計階段實施風險評估，並合理編列安全衛生費用。', analysis: '【業主責任明確化】' },
                        { article: '第 27-1 條 (修正)', oldText: '事業單位與承攬人分別僱用勞工共同作業時，應指定一人負責統合。', newText: '業主應指定一人負整體統合管理責任，並設置管理協議組織。', analysis: '【統合管理升級】' }
                    ];
                }
                return [{ article: '內容鑑別中', oldText: '載入舊版條文內容...', newText: '載入最新公佈條文內容...', analysis: 'AI 正在分析此法規的具體變動對企業適用的影響。' }];
            };

            const startSync = (law) => {
                setIsSyncing(true);
                setTimeout(() => {
                    setSelectedLaw(law);
                    setActiveTab('compare');
                    setIsSyncing(false);
                }, 1200);
            };

            return (
                <div className="min-h-screen flex flex-col">
                    <header className="bg-white border-b border-slate-200 px-8 py-4 flex justify-between items-center sticky top-0 z-40 shadow-sm">
                        <div className="flex items-center gap-3">
                            <div className="bg-blue-600 w-10 h-10 rounded-xl flex items-center justify-center text-white shadow-lg">
                                <i className="fas fa-file-shield text-lg"></i>
                            </div>
                            <div>
                                <h1 className="text-lg font-black text-slate-800 leading-tight">職安法規自動監控與鑑別系統</h1>
                                <div className="flex flex-col">
                                    <div className="flex items-center gap-1.5 text-[10px] text-emerald-500 font-bold uppercase tracking-widest leading-none">
                                        <span className="flex h-2 w-2 relative">
                                            <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                                            <span className="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                                        </span>
                                        Live Sync Active
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div className="flex items-center gap-6">
                            <div className="flex items-center gap-2 bg-slate-100 px-4 py-2 rounded-full border border-slate-200 text-xs font-bold text-slate-500">
                                <span>全國法規資料庫 API 連線中</span>
                            </div>
                        </div>
                    </header>

                    {isSyncing && (
                        <div className="fixed inset-0 z-50 flex flex-col items-center justify-center bg-slate-900/70 backdrop-blur-md text-center">
                            <div className="bg-white p-10 rounded-[3rem] shadow-2xl relative overflow-hidden">
                                <div className="scan-line absolute inset-0"></div>
                                <i className="fas fa-sync-alt text-6xl text-blue-600 animate-spin mb-4"></i>
                                <h3 className="text-xl font-black text-slate-800">正在同步最新法規數據...</h3>
                                <p className="text-slate-400 mt-2 text-sm font-bold">正在從全國法規資料庫獲取最新條文全文</p>
                            </div>
                        </div>
                    )}

                    <main className="flex-1 p-8 overflow-y-auto bg-slate-50/50">
                        <div className="max-w-6xl mx-auto">
                            {activeTab === 'monitor' ? (
                                <div className="fade-in pt-4">
                                    <div className="grid grid-cols-1 gap-6">
                                        {initialLaws.map((law, index) => (
                                            <div 
                                                key={law.id} 
                                                className="p-6 rounded-3xl transition-all flex items-center justify-between law-card-glow"
                                            >
                                                <div className="flex gap-5 items-center">
                                                    <div className="w-12 h-12 rounded-2xl flex items-center justify-center text-xl shrink-0 bg-orange-500 text-white shadow-lg">
                                                        <span className="text-sm font-black">{index + 1}</span>
                                                    </div>
                                                    <div className="flex flex-col gap-1">
                                                        <div className="flex items-center gap-2">
                                                            <h3 className="font-black text-lg text-slate-800 tracking-tight leading-snug max-w-xl">
                                                                {law.name}
                                                            </h3>
                                                            <span className="text-[9px] font-black bg-orange-100 text-orange-600 px-2 py-0.5 rounded-full whitespace-nowrap">
                                                                {law.type}
                                                            </span>
                                                        </div>
                                                        <div className="flex items-center gap-2">
                                                            <span className="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">最新公佈日期：</span>
                                                            <span className="text-xs font-black tracking-tight text-orange-600">
                                                                {law.remoteDate}
                                                            </span>
                                                        </div>
                                                    </div>
                                                </div>
                                                <div className="flex items-center gap-3 shrink-0">
                                                    <div className="flex items-center gap-2">
                                                        <button 
                                                            onClick={() => startSync(law)}
                                                            className="px-8 py-3 rounded-xl font-black text-xs transition-all active:scale-95 bg-blue-600 text-white shadow-lg hover:bg-blue-700"
                                                        >
                                                            啟動鑑別
                                                        </button>
                                                        <button 
                                                            onClick={() => startSync(law)}
                                                            className="px-8 py-3 rounded-xl font-black text-xs transition-all active:scale-95 bg-orange-500 text-white shadow-lg hover:bg-orange-600"
                                                        >
                                                            查看詳情
                                                        </button>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            ) : (
                                <div className="fade-in space-y-6">
                                    <button onClick={() => setActiveTab('monitor')} className="flex items-center gap-2 text-sm font-black text-slate-400 hover:text-blue-600 transition-all mb-4">
                                        <i className="fas fa-arrow-left"></i> 返回清單列表
                                    </button>
                                    <div className="bg-white rounded-[3rem] shadow-2xl border border-slate-100 overflow-hidden">
                                        <div className="bg-gradient-to-r from-slate-50 to-white p-10 border-b border-slate-100 flex justify-between items-end">
                                            <div>
                                                <h2 className="text-3xl font-black text-slate-800 tracking-tighter mb-4 max-w-2xl">{selectedLaw?.name}</h2>
                                                <div className="flex items-center gap-4">
                                                    <div className="bg-blue-50 px-4 py-2 rounded-xl border border-blue-200 shadow-sm">
                                                        <div className="text-[10px] font-black text-blue-500 uppercase">全國最新公佈日期</div>
                                                        <div className="text-sm font-black text-blue-700">{selectedLaw?.remoteDate}</div>
                                                    </div>
                                                </div>
                                            </div>
                                            <div className="bg-orange-50 p-5 rounded-3xl border border-orange-100 max-w-xs text-[11px] font-bold text-orange-700 leading-relaxed">
                                                <i className="fas fa-microchip mr-2 text-orange-500"></i> AI 已同步條文全文，請確認下方具體變動點。
                                            </div>
                                        </div>
                                        <div className="p-10 space-y-12 bg-white">
                                            {getComparisonData(selectedLaw?.name).map((item, idx) => (
                                                <div key={idx} className="space-y-4">
                                                    <h4 className="text-2xl font-black text-slate-800 flex items-center gap-3">
                                                        <span className="w-8 h-8 rounded-lg bg-slate-900 text-white flex items-center justify-center text-xs font-black">{idx + 1}</span>
                                                        {item.article}
                                                    </h4>
                                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                                        <div className="p-6 bg-slate-50 rounded-[2rem] border border-slate-100 text-slate-400 text-sm italic">{item.oldText}</div>
                                                        <div className="p-6 bg-white rounded-[2rem] border-2 border-blue-600 shadow-xl text-slate-800 text-sm font-bold leading-relaxed">{item.newText}</div>
                                                    </div>
                                                    <div className="bg-emerald-50 p-6 rounded-[2rem] border border-emerald-100 flex items-start gap-4 text-sm font-bold text-emerald-900">
                                                        <div className="bg-emerald-200 text-emerald-600 w-10 h-10 rounded-xl flex items-center justify-center shrink-0"><i className="fas fa-comment-dots"></i></div>
                                                        <div><div className="text-[10px] font-black text-emerald-600 uppercase mb-1">AI 專家解讀與建議</div>{item.analysis}</div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                        <div className="p-10 bg-slate-50 border-t border-slate-100 flex justify-end gap-4">
                                            <button className="px-8 py-3 rounded-2xl bg-white border border-slate-200 text-slate-600 font-black text-sm">列印鑑別報告</button>
                                            <button className="px-8 py-3 rounded-2xl bg-blue-600 text-white font-black text-sm shadow-lg hover:bg-blue-700">確認更新並保存</button>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>

                    <footer className="px-8 py-4 bg-white border-t border-slate-100 flex justify-between items-center text-[10px] font-bold text-slate-300 uppercase tracking-widest">
                        <div>資料介接：全國法規資料庫 API</div>
                        <div className="flex items-center gap-2">
                            <span>Safety AI 職安法規自動化監控系統 v4.0</span>
                            <span className="text-slate-200">|</span>
                            <span className="text-slate-400">Developed by Sam Sun</span>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
