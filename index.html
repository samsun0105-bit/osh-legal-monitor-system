<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>職安法規自動監控與鑑別系統 v4.5 - 即時同步版</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f8fafc;
        }
        @keyframes scan {
            0% { transform: translateY(-100%); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: translateY(100%); opacity: 0; }
        }
        .scan-line {
            height: 2px;
            background: linear-gradient(to right, transparent, #3b82f6, transparent);
            animation: scan 2s linear infinite;
        }
        .fade-in {
            animation: fadeIn 0.4s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes blink {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(0.95); }
        }
        .new-badge {
            animation: blink 1.5s infinite;
        }
        .law-card-glow {
            border: 1px solid #e2e8f0;
            background-color: #ffffff;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .law-card-glow:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
            border-color: #3b82f6;
        }
        ins { background: #e6ffed; text-decoration: none; border-bottom: 2px solid #059669; font-weight: 500; color: #065f46; padding: 0 2px; }
        del { background: #ffeef0; color: #991b1b; text-decoration: line-through; padding: 0 2px; }

        @media print {
            header, footer, .back-nav-btn, .action-buttons, .time-display-box {
                display: none !important;
            }
            body { background-color: white !important; }
            .main-container { padding: 0 !important; margin: 0 !important; width: 100% !important; }
            .workbench-card { border: none !important; box-shadow: none !important; padding: 0 !important; }
            table { width: 100% !important; border-collapse: collapse !important; }
            td, th { border: 1px solid #cbd5e1 !important; padding: 12px !important; }
            @page { size: A4; margin: 1.5cm; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const LAW_DIFF_DATABASE = {
            1: { 
                rows: [
                    { no: '第 4 條', old: '本法適用於各業。但因事業規模、性質及風險程度...', new: '本法適用於各業。但因事業規模、性質及風險程度，經中央主管機關指定公告者，<ins>得分階段適用</ins>。', note: '擴大適用範圍' },
                    { no: '第 45 條', old: '有下列情事之一者，處新臺幣三萬元以上十五萬元以下罰鍰...', new: '有下列情事之一者，處新臺幣三萬元以上<ins>三十萬元</ins>以下罰鍰...', note: '罰則加重' }
                ],
                ai: '本次修正主要針對罰則金額上限進行調整，並授權主管機關得視風險程度分階段擴大適用範圍。'
            },
            4: {
                rows: [
                    { no: '第 21 條', old: '雇主對於勞工從事作業，應採取必要之安全設備及措施。', new: '雇主對於勞工從事作業，應採取必要之安全設備及措施，<ins>並應落實自動檢查計畫</ins>。', note: '加強自主管理' }
                ],
                ai: '設施規則增加了對自動檢查計畫的落實要求。'
            }
        };

        const getMockDiff = (law) => {
            if (LAW_DIFF_DATABASE[law.id]) return LAW_DIFF_DATABASE[law.id];
            return {
                rows: [{ no: '第 1 條', old: '原條文內容', new: '新條文內容 <ins>(修正項)</ins>', note: '程序強化' }],
                ai: '建議落實 PDCA 循環，確保紀錄完整。'
            };
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('monitor');
            const [isSyncing, setIsSyncing] = useState(false);
            const [syncText, setSyncText] = useState('');
            const [selectedLaw, setSelectedLaw] = useState(null);
            const [searchQuery, setSearchQuery] = useState('');
            const [filterType, setFilterType] = useState('全部');
            const [currentTime, setCurrentTime] = useState(new Date());

            // 取得即時時間字串 (含時分)
            const getLiveTimestamp = () => {
                const now = new Date();
                const y = now.getFullYear();
                const m = String(now.getMonth() + 1).padStart(2, '0');
                const d = String(now.getDate()).padStart(2, '0');
                const hh = String(now.getHours()).padStart(2, '0');
                const mm = String(now.getMinutes()).padStart(2, '0');
                return `${y}-${m}-${d} ${hh}:${mm}`;
            };

            const [laws, setLaws] = useState([
                { id: 1, name: '職業安全衛生法', type: '法律', remoteDate: '2025-12-19', localCheckDate: '2026-03-02' },
                { id: 2, name: '職業安全衛生法施行細則', type: '法規命令', remoteDate: '2020-02-27', localCheckDate: '2026-03-02' },
                { id: 3, name: '職業安全衛生管理辦法', type: '法規命令', remoteDate: '2022-01-05', localCheckDate: '2026-03-02' },
                { id: 4, name: '職業安全衛生設施規則', type: '法規命令', remoteDate: '2024-08-01', localCheckDate: '2026-03-02' },
                { id: 5, name: '職業安全衛生教育訓練規則', type: '法規命令', remoteDate: '2025-09-04', localCheckDate: '2026-03-02' },
                { id: 24, name: '勞動基準法', type: '法律', remoteDate: '2024-07-31', localCheckDate: '2026-03-02' }
            ]);

            useEffect(() => {
                const timer = setInterval(() => setCurrentTime(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);

            const formatTime = (date) => {
                return date.toLocaleString('zh-TW', { hour12: false });
            };

            const getLawStatus = (remoteDate, localDate) => {
                const rDate = new Date(remoteDate);
                const lDate = new Date(localDate);
                if (rDate > lDate) return { code: 'danger', color: 'bg-rose-500', text: '需重新鑑別' };
                return { code: 'success', color: 'bg-emerald-600', text: '鑑別完成' };
            };

            // 全同步啟動功能
            const handleAllSync = () => {
                setSyncText('正在執行全法規資料庫即時同步...');
                setIsSyncing(true);
                const timestamp = getLiveTimestamp();
                
                setTimeout(() => {
                    setLaws(prev => prev.map(law => ({ ...law, localCheckDate: timestamp })));
                    setIsSyncing(false);
                }, 1500);
            };

            // 單一即時鑑別紀錄功能
            const handleSingleSync = (lawId) => {
                setSyncText('系統正在寫入即時鑑別紀錄...');
                setIsSyncing(true);
                const timestamp = getLiveTimestamp();
                
                setTimeout(() => {
                    setLaws(prev => prev.map(law => 
                        law.id === lawId ? { ...law, localCheckDate: timestamp } : law
                    ));
                    setIsSyncing(false);
                }, 800);
            };

            const handleExport = () => {
                const exportData = laws.map(law => ({
                    "法規名稱": law.name,
                    "法規類別": law.type,
                    "全國法規日期": law.remoteDate,
                    "公司鑑別日期": law.localCheckDate,
                    "狀態": getLawStatus(law.remoteDate, law.localCheckDate).text
                }));
                const ws = XLSX.utils.json_to_sheet(exportData);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "鑑別紀錄");
                XLSX.writeFile(wb, `法規鑑別表_${getLiveTimestamp().replace(/[: ]/g, '_')}.xlsx`);
            };

            const filteredLaws = useMemo(() => {
                return laws.filter(law => (filterType === '全部' || law.type === filterType) && law.name.includes(searchQuery));
            }, [searchQuery, filterType, laws]);

            const startCompare = (law) => {
                setSyncText(`正在讀取《${law.name}》最新條文...`);
                setIsSyncing(true);
                setTimeout(() => {
                    setSelectedLaw(law);
                    setActiveTab('compare');
                    setIsSyncing(false);
                }, 600);
            };

            return (
                <div className="min-h-screen flex flex-col">
                    <header className="bg-slate-900 border-b border-slate-800 px-10 py-6 flex justify-between items-center sticky top-0 z-40 shadow-xl">
                        <div className="flex items-center gap-6">
                            <div className="bg-blue-600 w-12 h-12 rounded-xl flex items-center justify-center text-white">
                                <i className="fas fa-shield-halved text-2xl"></i>
                            </div>
                            <div>
                                <h1 className="text-xl font-black text-white leading-tight">職安法規自動監控系統</h1>
                                <div className="text-[10px] text-emerald-400 font-black uppercase tracking-widest mt-1">
                                    <i className="fas fa-sync fa-spin mr-1"></i> 雲端 API 已同步
                                </div>
                            </div>
                        </div>

                        <div className="flex flex-col items-end gap-2">
                            <div className="text-slate-400 font-mono text-xs">{formatTime(currentTime)}</div>
                            <div className="flex gap-3">
                                <button onClick={handleAllSync} className="bg-indigo-600 text-white px-4 py-2 rounded-lg text-xs font-bold hover:bg-indigo-700 transition-all">一鍵同步</button>
                                <button onClick={handleExport} className="bg-slate-700 text-white px-4 py-2 rounded-lg text-xs font-bold hover:bg-slate-800 transition-all">匯出總表</button>
                            </div>
                        </div>
                    </header>

                    {isSyncing && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/60 backdrop-blur-sm">
                            <div className="bg-white p-10 rounded-3xl shadow-2xl text-center relative overflow-hidden max-w-xs w-full">
                                <div className="scan-line absolute inset-0"></div>
                                <i className="fas fa-circle-notch text-4xl text-blue-600 animate-spin mb-4"></i>
                                <h3 className="text-lg font-black text-slate-800">{syncText}</h3>
                            </div>
                        </div>
                    )}

                    <main className="flex-1 p-8 main-container">
                        <div className="max-w-6xl mx-auto">
                            {activeTab === 'monitor' ? (
                                <div className="fade-in space-y-6">
                                    <div className="flex justify-between items-end">
                                        <h2 className="text-2xl font-black text-slate-800">法規監控清單</h2>
                                        <input 
                                            type="text" 
                                            placeholder="搜尋法規..." 
                                            className="px-4 py-2 border rounded-xl text-sm outline-none focus:ring-2 focus:ring-blue-500"
                                            value={searchQuery}
                                            onChange={(e) => setSearchQuery(e.target.value)}
                                        />
                                    </div>
                                    <div className="grid grid-cols-1 gap-4">
                                        {filteredLaws.map(law => {
                                            const status = getLawStatus(law.remoteDate, law.localCheckDate);
                                            return (
                                                <div key={law.id} className="p-5 rounded-2xl law-card-glow flex justify-between items-center">
                                                    <div className="flex-1">
                                                        <div className="flex items-center gap-3 mb-1">
                                                            <h3 className="font-bold text-slate-800">{law.name}</h3>
                                                            <span className="text-[10px] bg-slate-100 px-2 py-0.5 rounded text-slate-500">{law.type}</span>
                                                            {status.code === 'danger' && <span className="new-badge text-[10px] bg-rose-500 text-white px-2 py-0.5 rounded">異動</span>}
                                                        </div>
                                                        <div className="text-xs text-slate-500 flex gap-4">
                                                            <span>公佈日: {law.remoteDate}</span>
                                                            <span className={status.code === 'danger' ? 'text-rose-500 font-bold' : 'text-emerald-600'}>最後鑑別: {law.localCheckDate}</span>
                                                        </div>
                                                    </div>
                                                    <div className="flex gap-2">
                                                        <button onClick={() => startCompare(law)} className="px-4 py-2 text-xs font-bold border rounded-lg hover:bg-slate-50">比對</button>
                                                        <button 
                                                            onClick={() => handleSingleSync(law.id)}
                                                            className={`px-4 py-2 text-xs font-bold text-white rounded-lg ${status.code === 'danger' ? 'bg-rose-500' : 'bg-blue-600'}`}
                                                        >
                                                            立即鑑別
                                                        </button>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            ) : (
                                <div className="fade-in space-y-6">
                                    <button onClick={() => setActiveTab('monitor')} className="text-slate-500 font-bold text-sm hover:text-blue-600">
                                        <i className="fas fa-arrow-left mr-2"></i>返回清單
                                    </button>
                                    <div className="bg-white rounded-3xl shadow-xl overflow-hidden workbench-card border">
                                        <div className="p-8 bg-slate-50 border-b flex justify-between items-center">
                                            <div>
                                                <h2 className="text-2xl font-black text-slate-800">{selectedLaw?.name}</h2>
                                                <p className="text-sm text-slate-500 mt-1">法規即時比對視窗</p>
                                            </div>
                                            <button 
                                                onClick={() => { handleSingleSync(selectedLaw.id); setActiveTab('monitor'); }}
                                                className="bg-blue-600 text-white px-6 py-3 rounded-xl font-bold shadow-lg hover:bg-blue-700"
                                            >
                                                確認鑑別並更新紀錄
                                            </button>
                                        </div>
                                        <div className="p-8">
                                            <table className="w-full text-left border-collapse">
                                                <thead>
                                                    <tr className="bg-slate-100">
                                                        <th className="p-4 border">條號</th>
                                                        <th className="p-4 border">舊條文</th>
                                                        <th className="p-4 border">新條文 (比對)</th>
                                                        <th className="p-4 border">備註</th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {getMockDiff(selectedLaw).rows.map((row, i) => (
                                                        <tr key={i}>
                                                            <td className="p-4 border font-bold text-blue-600">{row.no}</td>
                                                            <td className="p-4 border text-slate-400 line-through text-sm">{row.old}</td>
                                                            <td className="p-4 border text-sm" dangerouslySetInnerHTML={{ __html: row.new }}></td>
                                                            <td className="p-4 border text-xs text-slate-500">{row.note}</td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                            <div className="mt-8 p-6 bg-emerald-50 rounded-2xl border border-emerald-100">
                                                <h4 className="font-black text-emerald-800 flex items-center gap-2 mb-2">
                                                    <i className="fas fa-robot"></i> AI 修正建議
                                                </h4>
                                                <p className="text-emerald-700 text-sm">{getMockDiff(selectedLaw).ai}</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
