<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>職安法規自動監控與鑑別系統 v4.5 - 合規風險管理</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f8fafc;
        }
        @keyframes scan {
            0% { transform: translateY(-100%); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: translateY(100%); opacity: 0; }
        }
        .scan-line {
            height: 2px;
            background: linear-gradient(to right, transparent, #3b82f6, transparent);
            animation: scan 2s linear infinite;
        }
        .fade-in {
            animation: fadeIn 0.4s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes blink {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(0.95); }
        }
        .new-badge {
            animation: blink 1.5s infinite;
        }
        
        .law-card-glow {
            border: 1px solid #e2e8f0;
            background-color: #ffffff;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .law-card-glow:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
            border-color: #3b82f6;
        }

        .developer-tag {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            z-index: 100;
        }

        ins { background: #e6ffed; text-decoration: none; border-bottom: 2px solid #059669; font-weight: 500; color: #065f46; }
        del { background: #ffeef0; color: #991b1b; text-decoration: line-through; }

        @media print {
            header, footer, .developer-tag, .back-nav-btn, .action-buttons, .sidebar-mock, .time-display-box {
                display: none !important;
            }
            body { background-color: white !important; }
            .main-container { padding: 0 !important; margin: 0 !important; width: 100% !important; max-width: none !important; }
            .workbench-card { border: none !important; box-shadow: none !important; padding: 0 !important; }
            .print-header { display: block !important; margin-bottom: 2rem; border-bottom: 2px solid #333; padding-bottom: 1rem; }
            table { width: 100% !important; border-collapse: collapse !important; page-break-inside: auto; }
            tr { page-break-inside: avoid; page-break-after: auto; }
            td, th { border: 1px solid #cbd5e1 !important; padding: 12px !important; }
            @page { size: A4; margin: 1.5cm; }
        }
        .print-header { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const App = () => {
            const [activeTab, setActiveTab] = useState('monitor');
            const [isSyncing, setIsSyncing] = useState(false);
            const [syncText, setSyncText] = useState('正在執行鑑別程序...');
            const [selectedLaw, setSelectedLaw] = useState(null);
            const [searchQuery, setSearchQuery] = useState('');
            const [filterType, setFilterType] = useState('全部');
            const [currentTime, setCurrentTime] = useState(new Date());

            // 固定今天日期作為鑑別基準 (依照您的系統設定)
            const TODAY_STR = '2026-03-24';
            const UNIFIED_INITIAL_DATE = '2026-03-02';

            // 初始法規清單
            const [laws, setLaws] = useState([
                { id: 1, name: '職業安全衛生法', type: '法律', remoteDate: '2025-12-19', localCheckDate: UNIFIED_INITIAL_DATE },
                { id: 2, name: '職業安全衛生法施行細則', type: '法規命令', remoteDate: '2020-02-27', localCheckDate: UNIFIED_INITIAL_DATE },
                { id: 3, name: '職業安全衛生管理辦法', type: '法規命令', remoteDate: '2022-01-05', localCheckDate: UNIFIED_INITIAL_DATE },
                { id: 4, name: '職業安全衛生設施規則', type: '法規命令', remoteDate: '2024-08-01', localCheckDate: UNIFIED_INITIAL_DATE },
                { id: 5, name: '職業安全衛生教育訓練規則', type: '法規命令', remoteDate: '2025-09-04', localCheckDate: UNIFIED_INITIAL_DATE },
                { id: 6, name: '職業安全衛生標示設置準則', type: '法規命令', remoteDate: '2014-07-02', localCheckDate: UNIFIED_INITIAL_DATE },
                { id: 7, name: '勞工作業環境監測實施辦法', type: '法規命令', remoteDate: '2016-11-02', localCheckDate: UNIFIED_INITIAL_DATE },
                { id: 8, name: '勞工作業場所容許暴露標準', type: '法規命令', remoteDate: '2025-04-11', localCheckDate: UNIFIED_INITIAL_DATE },
                { id: 9, name: '有機溶劑中毒預防規則', type: '法規命令', remoteDate: '2025-05-14', localCheckDate: UNIFIED_INITIAL_DATE },
                { id: 10, name: '危害性化學品標示及通識規則', type: '法規命令', remoteDate: '2018-11-09', localCheckDate: UNIFIED_INITIAL_DATE },
                { id: 11, name: '勞工健康保護規則', type: '法規命令', remoteDate: '2021-12-22', localCheckDate: UNIFIED_INITIAL_DATE },
                { id: 12, name: '女性勞工母性健康保護實施辦法', type: '法規命令', remoteDate: '2024-05-31', localCheckDate: UNIFIED_INITIAL_DATE },
                { id: 13, name: '妊娠與分娩後女性及未滿十八歲勞工禁止從事危險性或有害性工作認定標準', type: '行政規則', remoteDate: '2025-11-20', localCheckDate: UNIFIED_INITIAL_DATE },
                { id: 14, name: '精密作業勞工視機能保護設施標準', type: '法規命令', remoteDate: '2014-03-30', localCheckDate: UNIFIED_INITIAL_DATE },
                { id: 15, name: '工業用機器人危害預防標準', type: '法規命令', remoteDate: '2018-02-14', localCheckDate: UNIFIED_INITIAL_DATE },
                { id: 16, name: '鍋爐及壓力容器安全規則', type: '法規命令', remoteDate: '2014-07-01', localCheckDate: UNIFIED_INITIAL_DATE },
                { id: 17, name: '游離輻射防護法', type: '法律', remoteDate: '2002-01-30', localCheckDate: UNIFIED_INITIAL_DATE },
                { id: 18, name: '游離輻射防護法施行細則', type: '法規命令', remoteDate: '2008-02-22', localCheckDate: UNIFIED_INITIAL_DATE },
                { id: 19, name: '游離輻射防護安全標準', type: '法規命令', remoteDate: '2005-12-30', localCheckDate: UNIFIED_INITIAL_DATE },
                { id: 20, name: '放射性物質與可發生游離輻射設備及其輻射作業管理辦法', type: '法規命令', remoteDate: '2018-12-22', localCheckDate: UNIFIED_INITIAL_DATE },
                { id: 21, name: '放射性物質或可發生游離輻射設備操作人員管理辦法', type: '法規命令', remoteDate: '2009-04-17', localCheckDate: UNIFIED_INITIAL_DATE },
                { id: 22, name: '事業單位僱用女性勞工夜間工作場所必要之安全衛生設施標準', type: '法規命令', remoteDate: '2015-03-31', localCheckDate: UNIFIED_INITIAL_DATE },
                { id: 23, name: '機械設備器具安全標準', type: '法規命令', remoteDate: '2022-05-11', localCheckDate: UNIFIED_INITIAL_DATE },
                { id: 24, name: '勞動基準法', type: '法律', remoteDate: '2024-07-31', localCheckDate: UNIFIED_INITIAL_DATE },
                { id: 25, name: '勞工職業災害保險及保護法', type: '法律', remoteDate: '2021-04-30', localCheckDate: UNIFIED_INITIAL_DATE },
                { id: 26, name: '勞工職業災害保險及保護法施行細則', type: '法規命令', remoteDate: '2025-05-29', localCheckDate: UNIFIED_INITIAL_DATE },
                { id: 27, name: '勞工職業災害保險及保護法第十條規定參加保險辦法', type: '法規命令', remoteDate: '2022-03-09', localCheckDate: UNIFIED_INITIAL_DATE },
                { id: 28, name: '缺氧症預防規則', type: '法規命令', remoteDate: '2014-06-26', localCheckDate: UNIFIED_INITIAL_DATE }
            ]);

            useEffect(() => {
                const timer = setInterval(() => setCurrentTime(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);

            const formatTime = (date) => {
                const y = date.getFullYear();
                const m = String(date.getMonth() + 1).padStart(2, '0');
                const d = String(date.getDate()).padStart(2, '0');
                const hh = String(date.getHours()).padStart(2, '0');
                const mm = String(date.getMinutes()).padStart(2, '0');
                const ss = String(date.getSeconds()).padStart(2, '0');
                return `${y}/${m}/${d} ${hh}:${mm}:${ss}`;
            };

            // 判斷法規狀態
            const getLawStatus = (remoteDate, localDate) => {
                const rDate = new Date(remoteDate);
                const lDate = localDate ? new Date(localDate) : new Date(0);
                const today = new Date(TODAY_STR);
                
                // 若全國日期較新，需重新鑑別
                if (rDate > lDate) return { code: 'danger', color: 'bg-rose-500', text: '需重新鑑別' };
                // 若超過一年未鑑別，例行性檢視
                if ((today - lDate) / (1000 * 60 * 60 * 24) > 365) return { code: 'warning', color: 'bg-amber-500', text: '例行性檢視' };
                return { code: 'success', color: 'bg-emerald-600', text: '鑑別完成' };
            };

            // 功能：一鍵同步全部法規日期
            const handleAllSync = () => {
                setSyncText('正在批次執行全法規鑑別同步...');
                setIsSyncing(true);
                setTimeout(() => {
                    setLaws(prev => prev.map(law => ({ ...law, localCheckDate: TODAY_STR })));
                    setIsSyncing(false);
                }, 2000);
            };

            // 功能：單項法規「立即鑑別」更新日期
            const handleSingleSync = (lawId) => {
                setSyncText('正在更新該項法規鑑別紀錄...');
                setIsSyncing(true);
                setTimeout(() => {
                    setLaws(prev => prev.map(law => law.id === lawId ? { ...law, localCheckDate: TODAY_STR } : law));
                    setIsSyncing(false);
                }, 1000);
            };

            const handleExport = () => {
                const quarter = Math.ceil((new Date(TODAY_STR).getMonth() + 1) / 3);
                const exportData = laws.map((law, index) => {
                    const status = getLawStatus(law.remoteDate, law.localCheckDate);
                    return {
                        "序號": index + 1,
                        "法規名稱": law.name,
                        "法規類別": law.type,
                        "鑑別季度": `2026 Q${quarter}`,
                        "全國法規資料庫日期": law.remoteDate,
                        "公司最近登錄/鑑別日期": law.localCheckDate,
                        "合規狀態": status.text
                    };
                });
                const worksheet = XLSX.utils.json_to_sheet(exportData);
                const workbook = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(workbook, worksheet, "法規鑑別總表");
                XLSX.writeFile(workbook, `職安法規鑑別總表_2026_Q${quarter}.xlsx`);
            };

            const filteredLaws = useMemo(() => {
                return laws.filter(law => (filterType === '全部' || law.type === filterType) && law.name.includes(searchQuery));
            }, [searchQuery, filterType, laws]);

            const startSync = (law) => {
                setSyncText('正在讀取詳細對照資料...');
                setIsSyncing(true);
                setTimeout(() => {
                    setSelectedLaw(law);
                    setActiveTab('compare');
                    setIsSyncing(false);
                }, 800);
            };

            return (
                <div className="min-h-screen flex flex-col">
                    <header className="bg-slate-900 border-b border-slate-800 px-10 py-6 flex justify-between items-center sticky top-0 z-40 shadow-xl">
                        <div className="flex items-center gap-6">
                            <div className="bg-blue-600 w-14 h-14 rounded-2xl flex items-center justify-center text-white shadow-lg shadow-blue-500/30">
                                <i className="fas fa-shield-halved text-3xl"></i>
                            </div>
                            <div>
                                <h1 className="text-2xl font-black text-white leading-tight flex items-center gap-3">
                                    職安法規自動監控與鑑別系統
                                    <span className="text-blue-400 font-black text-3xl ml-1">v4.5</span>
                                </h1>
                                <div className="text-xs text-slate-400 font-bold uppercase tracking-[0.3em] mt-1.5 opacity-80">
                                    INDUSTRIAL SAFETY COMPLIANCE MONITOR
                                </div>
                                <div className="flex items-center gap-2 text-xs text-emerald-400 font-black uppercase tracking-widest mt-2">
                                    <span className="flex h-2 w-2 relative">
                                        <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                                        <span className="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                                    </span>
                                    全國法規資料庫 API 連線中
                                </div>
                            </div>
                        </div>

                        <div className="flex flex-col items-end gap-3">
                            <div className="time-display-box">
                                <span className="text-slate-400 font-black text-xs tracking-widest tabular-nums opacity-90">
                                    {formatTime(currentTime)}
                                </span>
                            </div>
                            
                            <div className="flex items-center gap-4">
                                <button onClick={handleAllSync} className="hidden lg:flex items-center gap-3 px-6 py-2.5 bg-indigo-600 text-white rounded-xl text-sm font-black hover:bg-indigo-700 transition-all shadow-lg active:scale-95 border-b-4 border-indigo-900">
                                    <i className="fas fa-bolt"></i> 一鍵同步
                                </button>
                                <button onClick={handleExport} className="hidden lg:flex items-center gap-3 px-6 py-2.5 bg-slate-700 text-white rounded-xl text-sm font-black hover:bg-slate-800 transition-all shadow-lg active:scale-95 border-b-4 border-slate-950">
                                    <i className="fas fa-file-export"></i> 匯出總表
                                </button>
                                <div className="hidden md:flex bg-slate-800 p-1 rounded-xl border border-slate-700">
                                    {['全部', '法律', '法規命令', '行政規則'].map(type => (
                                        <button
                                            key={type}
                                            onClick={() => setFilterType(type)}
                                            className={`px-4 py-1.5 rounded-lg text-xs font-black transition-all ${filterType === type ? 'bg-slate-700 text-blue-400 shadow-md' : 'text-slate-500 hover:text-slate-300'}`}
                                        >
                                            {type}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </header>

                    {isSyncing && (
                        <div className="fixed inset-0 z-50 flex flex-col items-center justify-center bg-slate-900/70 backdrop-blur-md text-center">
                            <div className="bg-white p-16 rounded-[3rem] shadow-2xl relative overflow-hidden max-w-sm w-full mx-4">
                                <div className="scan-line absolute inset-0"></div>
                                <div className="relative z-10">
                                    <i className="fas fa-circle-notch text-6xl text-blue-600 animate-spin mb-8"></i>
                                    <h3 className="text-2xl font-black text-slate-800">{syncText}</h3>
                                    <p className="text-slate-500 mt-3 text-base font-medium">系統正在即時更新資料庫紀錄...</p>
                                </div>
                            </div>
                        </div>
                    )}

                    <main className="flex-1 p-8 md:p-12 overflow-y-auto main-container">
                        <div className="max-w-6xl mx-auto">
                            {activeTab === 'monitor' ? (
                                <div className="fade-in space-y-8">
                                    <div className="flex flex-col md:flex-row md:items-end justify-between gap-6">
                                        <div>
                                            <h2 className="text-3xl font-black text-slate-800 tracking-tight">法規動態監測</h2>
                                            <p className="text-slate-500 text-base font-medium mt-1">系統正在即時比對全國法規資料庫之最新修訂內容</p>
                                        </div>
                                        <div className="relative">
                                            <i className="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-slate-400"></i>
                                            <input 
                                                type="text" 
                                                placeholder="快速搜尋法規名稱..." 
                                                className="pl-14 pr-6 py-4 bg-white border border-slate-200 rounded-2xl text-base w-full md:w-80 focus:ring-4 focus:ring-blue-500/10 outline-none shadow-sm transition-all"
                                                value={searchQuery}
                                                onChange={(e) => setSearchQuery(e.target.value)}
                                            />
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-1 gap-5">
                                        {filteredLaws.map((law, index) => {
                                            const status = getLawStatus(law.remoteDate, law.localCheckDate);
                                            return (
                                                <div key={law.id} className="p-6 rounded-3xl transition-all flex flex-col lg:flex-row lg:items-center justify-between law-card-glow gap-8">
                                                    <div className="flex gap-6 items-center flex-1">
                                                        <div className="relative shrink-0">
                                                            <div className="w-14 h-14 rounded-2xl flex flex-col items-center justify-center shadow-lg bg-orange-400 text-white">
                                                                <span className="text-sm font-black tracking-tight">{index + 1}</span>
                                                            </div>
                                                        </div>

                                                        <div className="flex flex-col min-w-0 flex-1">
                                                            <div className="flex items-center gap-3 flex-wrap mb-2.5">
                                                                <h3 className="font-black text-slate-800 truncate text-xl">{law.name}</h3>
                                                                <span className="text-[10px] font-black bg-slate-100 text-slate-500 px-3 py-1 rounded-lg border border-slate-200 uppercase">{law.type}</span>
                                                                {status.code === 'danger' && <span className="new-badge text-[10px] font-black bg-rose-50 text-rose-600 px-3 py-1 rounded-lg border border-rose-200">法規已異動</span>}
                                                            </div>

                                                            <div className="flex flex-wrap items-center gap-y-3">
                                                                <div className="flex flex-col min-w-[140px]">
                                                                    <span className="text-[10px] font-bold text-slate-400 uppercase tracking-wider">全國法規公佈日</span>
                                                                    <span className="text-sm font-bold text-slate-700">{law.remoteDate}</span>
                                                                </div>
                                                                <div className="w-px h-8 bg-slate-200 mx-6 hidden sm:block"></div>
                                                                <div className="flex flex-col min-w-[140px]">
                                                                    <span className="text-[10px] font-bold text-slate-400 uppercase tracking-wider">公司最後鑑別日</span>
                                                                    <span className={`text-sm font-black ${status.code === 'danger' ? 'text-rose-500' : 'text-emerald-700'}`}>
                                                                        {law.localCheckDate}
                                                                    </span>
                                                                </div>
                                                                <div className="ml-6 flex items-center gap-2">
                                                                    <span className={`text-[11px] font-black px-4 py-1.5 rounded-lg shadow-sm ${status.code === 'success' ? 'bg-emerald-600 text-white' : status.code === 'danger' ? 'bg-rose-50 text-rose-500' : 'bg-slate-50 text-slate-400'}`}>
                                                                        {status.text}
                                                                    </span>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    </div>

                                                    <div className="flex items-center gap-4 shrink-0 ml-20 lg:ml-0">
                                                        <button onClick={() => startSync(law)} className="flex-1 md:flex-none px-6 py-4 rounded-2xl font-black text-sm bg-slate-100 text-slate-600 border border-slate-200 hover:bg-slate-200 transition-all active:scale-95">查看詳情</button>
                                                        <button
                                                            onClick={() => handleSingleSync(law.id)}
                                                            className={`flex-1 md:flex-none px-10 py-4 rounded-2xl font-black text-sm text-white shadow-xl transition-all duration-200 transform hover:scale-105 active:scale-95 flex items-center justify-center ${status.code === 'danger' ? 'bg-rose-600 shadow-rose-600/30 hover:bg-rose-700 animate-pulse' : 'bg-blue-600 shadow-blue-600/30 hover:bg-blue-700'}`}
                                                        >
                                                            立即鑑別
                                                        </button>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            ) : (
                                <div className="fade-in space-y-8">
                                    <button onClick={() => setActiveTab('monitor')} className="back-nav-btn flex items-center gap-3 text-base font-black text-slate-500 hover:text-blue-600 transition-all group">
                                        <i className="fas fa-chevron-left transition-transform group-hover:-translate-x-1"></i> 返回監控清單
                                    </button>
                                    
                                    <div className="bg-white rounded-[3rem] shadow-2xl border border-slate-200 overflow-hidden workbench-card">
                                        <div className="p-12 border-b border-slate-100 bg-slate-50/50">
                                            <div className="flex flex-col md:flex-row justify-between items-start md:items-end gap-8">
                                                <div className="space-y-5">
                                                    <div className="inline-flex items-center gap-2.5 bg-blue-100 text-blue-700 px-4 py-1.5 rounded-full text-[11px] font-black uppercase">
                                                        <i className="fas fa-microchip"></i> 鑑別工作台
                                                    </div>
                                                    <h2 className="text-4xl font-black text-slate-800 tracking-tight leading-tight">{selectedLaw?.name}</h2>
                                                    <div className="flex gap-6">
                                                        <div className="px-4 py-2 bg-white border border-slate-200 rounded-xl shadow-sm">
                                                            <span className="text-[10px] font-bold text-slate-400 block uppercase mb-1">最新公佈日</span>
                                                            <span className="text-sm font-black text-slate-700">{selectedLaw?.remoteDate}</span>
                                                        </div>
                                                        <div className="px-4 py-2 bg-white border border-slate-200 rounded-xl shadow-sm">
                                                            <span className="text-[10px] font-bold text-slate-400 block uppercase mb-1">前次鑑別日</span>
                                                            <span className="text-sm font-black text-emerald-600">{selectedLaw?.localCheckDate}</span>
                                                        </div>
                                                    </div>
                                                </div>
                                                <div className="flex gap-4 action-buttons">
                                                    <button onClick={() => window.print()} className="px-8 py-4 rounded-2xl bg-white border border-slate-200 text-slate-600 font-black text-base transition-all hover:bg-slate-50 active:scale-95">
                                                        <i className="fas fa-print mr-2"></i> 列印報告
                                                    </button>
                                                    <button
                                                        onClick={() => {
                                                            handleSingleSync(selectedLaw.id);
                                                            setActiveTab('monitor');
                                                        }}
                                                        className="px-8 py-4 rounded-2xl bg-blue-600 text-white font-black text-base shadow-xl hover:bg-blue-700 transition-all active:scale-95"
                                                    >
                                                        確認鑑別並更新日期
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                        {/* 下方對照表區域保持不變 */}
                                        <div className="p-12 space-y-12 bg-white">
                                            <div className="flex items-center gap-6 p-8 bg-emerald-50 border border-emerald-100 rounded-3xl">
                                                <div className="w-16 h-16 rounded-full bg-emerald-100 text-emerald-600 flex items-center justify-center shrink-0 shadow-inner">
                                                    <i className="fas fa-check-circle text-3xl"></i>
                                                </div>
                                                <div className="space-y-2">
                                                    <p className="text-lg font-black text-emerald-900 leading-relaxed">合規確認：本單位已完成最新條文鑑別。</p>
                                                    <p className="text-sm text-emerald-700/80 font-bold leading-relaxed italic">AI 分析建議：目前條文無重大變更影響公司現有作業，建議維持現行管理計畫。</p>
                                                </div>
                                            </div>
                                            <div className="space-y-8">
                                                <h3 className="text-2xl font-black text-slate-800 flex items-center gap-3">
                                                    <i className="fas fa-list-check text-blue-500"></i> 新舊條文對照表
                                                </h3>
                                                <div className="overflow-hidden border border-slate-200 rounded-3xl shadow-sm">
                                                    <table className="w-full text-left border-collapse">
                                                        <thead>
                                                            <tr className="bg-slate-50 border-b border-slate-200">
                                                                <th className="p-6 text-[11px] font-black text-slate-400 uppercase tracking-widest w-32">條號</th>
                                                                <th className="p-6 text-[11px] font-black text-slate-400 uppercase tracking-widest">舊版條文內容</th>
                                                                <th className="p-6 text-[11px] font-black text-slate-400 uppercase tracking-widest">新版條文內容</th>
                                                                <th className="p-6 text-[11px] font-black text-slate-400 uppercase tracking-widest w-40">變更說明</th>
                                                            </tr>
                                                        </thead>
                                                        <tbody className="divide-y divide-slate-100">
                                                            <tr className="hover:bg-slate-50/50 transition-colors">
                                                                <td className="p-6 font-black text-slate-700 text-base align-top">第 32 條</td>
                                                                <td className="p-6 text-base text-slate-500 leading-relaxed align-top italic">雇主對勞工應施以從事工作及預防災變所必要之<del>安全衛生</del>教育訓練。</td>
                                                                <td className="p-6 text-base text-slate-800 font-medium leading-relaxed align-top">雇主對勞工應施以從事工作及預防災變所必要之<ins>職業安全衛生</ins>教育訓練。</td>
                                                                <td className="p-6 align-top"><span className="text-[11px] font-black bg-blue-50 text-blue-600 px-3 py-1.5 rounded-lg border border-blue-100">文字修正</span></td>
                                                            </tr>
                                                        </tbody>
                                                    </table>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>

                    <div className="developer-tag group opacity-60 hover:opacity-100 transition-opacity">
                        <div className="bg-slate-900/95 backdrop-blur-xl text-white px-6 py-3 rounded-2xl shadow-2xl flex items-center gap-4 border border-white/20 transition-all hover:scale-105 cursor-default">
                            <div className="w-2.5 h-2.5 bg-emerald-400 rounded-full shadow-[0_0_12px_rgba(52,211,153,0.9)] animate-pulse"></div>
                            <span className="text-xs font-black tracking-[0.2em] uppercase">System Developer By Sam Sun</span>
                        </div>
                    </div>

                    <footer className="px-10 py-4 bg-white border-t border-slate-200 flex justify-between items-center text-[11px] font-black text-slate-400 uppercase tracking-widest">
                        <div className="flex items-center gap-6">
                            <span>資料來源：全國法規資料庫 API</span>
                            <span className="text-slate-200">|</span>
                            <span>已配置：ISO 45001 符合性鑑別模組</span>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
