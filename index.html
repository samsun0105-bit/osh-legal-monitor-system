<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>職安法規自動監控與鑑別系統 v4.5 - 合規風險管理</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f8fafc;
        }
        @keyframes scan {
            0% { transform: translateY(-100%); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: translateY(100%); opacity: 0; }
        }
        .scan-line {
            height: 2px;
            background: linear-gradient(to right, transparent, #3b82f6, transparent);
            animation: scan 2s linear infinite;
        }
        .fade-in {
            animation: fadeIn 0.4s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes blink {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(0.95); }
        }
        .new-badge {
            animation: blink 1.5s infinite;
        }
        
        .law-card-glow {
            border: 1px solid #e2e8f0;
            background-color: #ffffff;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .law-card-glow:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
            border-color: #3b82f6;
        }

        .developer-tag {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            z-index: 100;
            pointer-events: none;
        }

        ins { background: #e6ffed; text-decoration: none; border-bottom: 2px solid #059669; font-weight: 500; color: #065f46; }
        del { background: #ffeef0; color: #991b1b; text-decoration: line-through; }

        @media print {
            header, footer, .developer-tag, .back-nav-btn, .action-buttons, .sidebar-mock {
                display: none !important;
            }
            body { background-color: white !important; }
            .main-container { padding: 0 !important; margin: 0 !important; width: 100% !important; max-width: none !important; }
            .workbench-card { border: none !important; box-shadow: none !important; padding: 0 !important; }
            .print-header { display: block !important; margin-bottom: 2rem; border-bottom: 2px solid #333; padding-bottom: 1rem; }
            table { width: 100% !important; border-collapse: collapse !important; page-break-inside: auto; }
            tr { page-break-inside: avoid; page-break-after: auto; }
            td, th { border: 1px solid #cbd5e1 !important; padding: 12px !important; }
            @page { size: A4; margin: 1.5cm; }
        }
        .print-header { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        const App = () => {
            const [activeTab, setActiveTab] = useState('monitor');
            const [isSyncing, setIsSyncing] = useState(false);
            const [syncText, setSyncText] = useState('正在執行鑑別程序...');
            const [selectedLaw, setSelectedLaw] = useState(null);
            const [searchQuery, setSearchQuery] = useState('');
            const [filterType, setFilterType] = useState('全部');

            const TODAY = new Date('2026-03-23');
            const UNIFIED_DATE = '2026-03-02';

            const [laws, setLaws] = useState([
                { id: 1, name: '職業安全衛生法', type: '法律', remoteDate: '2025-12-19', localCheckDate: UNIFIED_DATE },
                { id: 2, name: '職業安全衛生法施行細則', type: '法規命令', remoteDate: '2020-02-27', localCheckDate: UNIFIED_DATE },
                { id: 3, name: '職業安全衛生管理辦法', type: '法規命令', remoteDate: '2022-01-05', localCheckDate: UNIFIED_DATE },
                { id: 4, name: '職業安全衛生設施規則', type: '法規命令', remoteDate: '2024-08-01', localCheckDate: UNIFIED_DATE },
                { id: 5, name: '職業安全衛生教育訓練規則', type: '法規命令', remoteDate: '2025-09-04', localCheckDate: UNIFIED_DATE },
                { id: 6, name: '職業安全衛生標示設置準則', type: '法規命令', remoteDate: '2014-07-02', localCheckDate: UNIFIED_DATE },
                { id: 7, name: '勞工作業環境監測實施辦法', type: '法規命令', remoteDate: '2016-11-02', localCheckDate: UNIFIED_DATE },
                { id: 8, name: '勞工作業場所容許暴露標準', type: '法規命令', remoteDate: '2025-04-11', localCheckDate: UNIFIED_DATE },
                { id: 9, name: '有機溶劑中毒預防規則', type: '法規命令', remoteDate: '2025-05-14', localCheckDate: UNIFIED_DATE },
                { id: 10, name: '危害性化學品標示及通識規則', type: '法規命令', remoteDate: '2018-11-09', localCheckDate: UNIFIED_DATE },
                { id: 11, name: '勞工健康保護規則', type: '法規命令', remoteDate: '2021-12-22', localCheckDate: UNIFIED_DATE },
                { id: 12, name: '女性勞工母性健康保護實施辦法', type: '法規命令', remoteDate: '2024-05-31', localCheckDate: UNIFIED_DATE },
                { id: 13, name: '妊娠與分娩後女性及未滿十八歲勞工禁止從事危險性或有害性工作認定標準', type: '行政規則', remoteDate: '2025-11-20', localCheckDate: UNIFIED_DATE },
                { id: 14, name: '精密作業勞工視機能保護設施標準', type: '法規命令', remoteDate: '2014-03-30', localCheckDate: UNIFIED_DATE },
                { id: 15, name: '工業用機器人危害預防標準', type: '法規命令', remoteDate: '2018-02-14', localCheckDate: UNIFIED_DATE },
                { id: 16, name: '鍋爐及壓力容器安全規則', type: '法規命令', remoteDate: '2014-07-01', localCheckDate: UNIFIED_DATE },
                { id: 17, name: '游離輻射防護法', type: '法律', remoteDate: '2002-01-30', localCheckDate: UNIFIED_DATE },
                { id: 18, name: '游離輻射防護法施行細則', type: '法規命令', remoteDate: '2008-02-22', localCheckDate: UNIFIED_DATE },
                { id: 19, name: '游離輻射防護安全標準', type: '法規命令', remoteDate: '2005-12-30', localCheckDate: UNIFIED_DATE },
                { id: 20, name: '放射性物質與可發生游離輻射設備及其輻射作業管理辦法', type: '法規命令', remoteDate: '2018-12-22', localCheckDate: UNIFIED_DATE },
                { id: 21, name: '放射性物質或可發生游離輻射設備操作人員管理辦法', type: '法規命令', remoteDate: '2009-04-17', localCheckDate: UNIFIED_DATE },
                { id: 22, name: '事業單位僱用女性勞工夜間工作場所必要之安全衛生設施標準', type: '法規命令', remoteDate: '2015-03-31', localCheckDate: UNIFIED_DATE },
                { id: 23, name: '機械設備器具安全標準', type: '法規命令', remoteDate: '2022-05-11', localCheckDate: UNIFIED_DATE },
                { id: 24, name: '勞動基準法', type: '法律', remoteDate: '2024-07-31', localCheckDate: UNIFIED_DATE },
                { id: 25, name: '勞工職業災害保險及保護法', type: '法律', remoteDate: '2021-04-30', localCheckDate: UNIFIED_DATE },
                { id: 26, name: '勞工職業災害保險及保護法施行細則', type: '法規命令', remoteDate: '2025-05-29', localCheckDate: UNIFIED_DATE },
                { id: 27, name: '勞工職業災害保險及保護法第十條規定參加保險辦法', type: '法規命令', remoteDate: '2022-03-09', localCheckDate: UNIFIED_DATE },
                { id: 28, name: '缺氧症預防規則', type: '法規命令', remoteDate: '2014-06-26', localCheckDate: UNIFIED_DATE }
            ]);

            const diffData = [
                { article: "第 32 條", old: "雇主對勞工應施以從事工作及預防災變所必要之<del>安全衛生</del>教育訓練。", new: "雇主對勞工應施以從事工作及預防災變所必要之<ins>職業安全衛生</ins>教育訓練。", note: "文字修正" },
                { article: "第 45 條", old: "(無舊條文內容)", new: "<ins>前項所定之監測，應由經中央主管機關認認可之作業環境監測機構辦理。但經中央主管機關指定者，得由事業單位自行辦理。</ins>", note: "新增條款" },
                { article: "第 48 條", old: "違反第十二條第一項、第二項、<del>第十四條第一項、第二項</del>、第十五條第一項、第二項...", new: "違反第十二條第一項、第二項、<ins>第十六條第一項至第三項</ins>、第十五條第一項、第二項...", note: "引用項次調整" }
            ];

            const handleExport = () => {
                const currentMonth = TODAY.getMonth() + 1;
                const quarter = Math.ceil(currentMonth / 3);
                const year = TODAY.getFullYear();
                
                const exportData = laws.map((law, index) => {
                    const status = getLawStatus(law.remoteDate, law.localCheckDate);
                    return {
                        "序號": index + 1,
                        "法規名稱": law.name,
                        "法規類別": law.type,
                        "鑑別季度": `${year} Q${quarter}`,
                        "全國法規資料庫日期": law.remoteDate,
                        "公司最近登錄/鑑別日期": law.localCheckDate,
                        "合規狀態": status.text,
                        "備註": status.code === 'danger' ? "發現新條文，需安排更新訓練" : "維持現行管理計畫"
                    };
                });

                const worksheet = XLSX.utils.json_to_sheet(exportData);
                const workbook = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(workbook, worksheet, "法規鑑別總表");
                XLSX.writeFile(workbook, `職安法規鑑別總表_${year}_Q${quarter}.xlsx`);
            };

            const handleAllSync = () => {
                setSyncText('正在批次執行立即鑑別同步...');
                setIsSyncing(true);
                setTimeout(() => {
                    const todayStr = TODAY.toISOString().split('T')[0];
                    setLaws(prev => prev.map(law => ({
                        ...law,
                        localCheckDate: todayStr
                    })));
                    setIsSyncing(false);
                }, 1500);
            };

            const getLawStatus = (remoteDate, localDate) => {
                const rDate = new Date(remoteDate);
                const lDate = localDate ? new Date(localDate) : new Date(0);
                if (rDate > lDate) return { code: 'danger', color: 'bg-rose-500', text: '需重新鑑別', icon: 'fa-triangle-exclamation' };
                const diffTime = TODAY - lDate;
                if (diffTime / (1000 * 60 * 60 * 24) > 365) return { code: 'warning', color: 'bg-amber-500', text: '例行性檢視', icon: 'fa-clock' };
                return { code: 'success', color: 'bg-emerald-600', text: '鑑別完成', icon: 'fa-circle-check' };
            };

            const filteredLaws = useMemo(() => {
                return laws.filter(law => {
                    const matchesSearch = law.name.includes(searchQuery);
                    const matchesFilter = filterType === '全部' || law.type === filterType;
                    return matchesSearch && matchesFilter;
                });
            }, [searchQuery, filterType, laws]);

            const handleImmediateIdentify = (lawId) => {
                setSyncText('正在執行立即鑑別程序...');
                setIsSyncing(true);
                setTimeout(() => {
                    setLaws(prev => prev.map(law => {
                        if (law.id === lawId) {
                            return { ...law, localCheckDate: TODAY.toISOString().split('T')[0] };
                        }
                        return law;
                    }));
                    setIsSyncing(false);
                }, 1000);
            };

            const startSync = (law) => {
                setSyncText('正在讀取詳細對照資料...');
                setIsSyncing(true);
                setTimeout(() => {
                    setSelectedLaw(law);
                    setActiveTab('compare');
                    setIsSyncing(false);
                }, 800);
            };

            return (
                <div className="min-h-screen flex flex-col">
                    <header className="bg-white/80 backdrop-blur-md border-b border-slate-200 px-8 py-4 flex justify-between items-center sticky top-0 z-40 shadow-sm">
                        <div className="flex items-center gap-3">
                            <div className="bg-blue-600 w-10 h-10 rounded-xl flex items-center justify-center text-white shadow-lg">
                                <i className="fas fa-shield-halved text-lg"></i>
                            </div>
                            <div>
                                <h1 className="text-lg font-black text-slate-800 leading-tight tracking-tight">職安法規自動監控系統 v4.5</h1>
                                <div className="flex items-center gap-1.5 text-[10px] text-emerald-500 font-bold uppercase tracking-widest">
                                    <span className="flex h-1.5 w-1.5 relative">
                                        <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                                        <span className="relative inline-flex rounded-full h-1.5 w-1.5 bg-emerald-500"></span>
                                    </span>
                                    全國法規資料庫 API 連線中
                                </div>
                            </div>
                        </div>
                        <div className="flex items-center gap-4">
                            <button onClick={handleAllSync} className="hidden lg:flex items-center gap-2 px-4 py-2 bg-indigo-600 text-white rounded-xl text-xs font-black hover:bg-indigo-700 transition-all shadow-md active:scale-95 border-b-2 border-indigo-900">
                                <i className="fas fa-bolt"></i> 一鍵立即鑑別
                            </button>
                            <button onClick={handleExport} className="hidden lg:flex items-center gap-2 px-4 py-2 bg-slate-800 text-white rounded-xl text-xs font-black hover:bg-slate-900 transition-all shadow-md active:scale-95">
                                <i className="fas fa-file-export"></i> 匯出鑑別紀錄總表
                            </button>
                        </div>
                    </header>

                    {isSyncing && (
                        <div className="fixed inset-0 z-50 flex flex-col items-center justify-center bg-slate-900/60 backdrop-blur-sm text-center">
                            <div className="bg-white p-12 rounded-[2.5rem] shadow-2xl relative overflow-hidden max-w-sm w-full mx-4">
                                <div className="scan-line absolute inset-0"></div>
                                <div className="relative z-10">
                                    <i className="fas fa-circle-notch text-5xl text-blue-600 animate-spin mb-6"></i>
                                    <h3 className="text-xl font-black text-slate-800">{syncText}</h3>
                                    <p className="text-slate-400 mt-2 text-sm font-medium">串接全國法規資料庫並更新鑑別狀態</p>
                                </div>
                            </div>
                        </div>
                    )}

                    <main className="flex-1 p-6 md:p-8 overflow-y-auto main-container">
                        <div className="max-w-6xl mx-auto">
                            {activeTab === 'monitor' ? (
                                <div className="fade-in space-y-6">
                                    <div className="grid grid-cols-1 gap-4">
                                        {filteredLaws.map((law, index) => {
                                            const status = getLawStatus(law.remoteDate, law.localCheckDate);
                                            return (
                                                <div key={law.id} className="p-5 rounded-2xl transition-all flex flex-col lg:flex-row lg:items-center justify-between law-card-glow gap-6">
                                                    <div className="flex gap-4 items-center flex-1">
                                                        <div className="relative shrink-0">
                                                            <div className="w-12 h-12 rounded-2xl flex flex-col items-center justify-center shadow-md bg-orange-400/90 text-white">
                                                                <span className="text-xs font-black tracking-tight">{index + 1}</span>
                                                            </div>
                                                        </div>
                                                        <div className="flex flex-col min-w-0 flex-1">
                                                            <div className="flex items-center gap-2 flex-wrap mb-1.5">
                                                                <h3 className="font-black text-slate-800 truncate text-base">{law.name}</h3>
                                                                <span className="text-[9px] font-black bg-slate-100 text-slate-500 px-2 py-0.5 rounded-md border border-slate-200 uppercase">{law.type}</span>
                                                                {status.code === 'danger' && <span className="new-badge text-[9px] font-black bg-rose-50 text-rose-600 px-2 py-0.5 rounded-md border border-rose-200">法規已異動</span>}
                                                            </div>
                                                            <div className="flex flex-wrap items-center gap-y-2">
                                                                <div className="flex flex-col min-w-[120px]">
                                                                    <span className="text-[9px] font-bold text-slate-400 uppercase tracking-tighter">全國法規公佈日</span>
                                                                    <span className="text-xs font-bold text-slate-700">{law.remoteDate}</span>
                                                                </div>
                                                                <div className="w-px h-6 bg-slate-200 mx-4 hidden sm:block"></div>
                                                                <div className="flex flex-col min-w-[120px]">
                                                                    <span className="text-[9px] font-bold text-slate-400 uppercase tracking-tighter">公司最後鑑別日</span>
                                                                    <span className={`text-xs font-black ${status.code === 'danger' ? 'text-rose-500' : 'text-emerald-700'}`}>{law.localCheckDate}</span>
                                                                </div>
                                                                <div className="ml-4">
                                                                    <span className={`text-[10px] font-black px-3 py-1 rounded shadow-sm ${status.code === 'success' ? 'bg-emerald-600 text-white' : status.code === 'danger' ? 'bg-rose-50 text-rose-500' : 'bg-slate-50 text-slate-400'}`}>
                                                                        {status.text}
                                                                    </span>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    </div>
                                                    <div className="flex items-center gap-3 shrink-0 ml-16 lg:ml-0">
                                                        <button onClick={() => startSync(law)} className="flex-1 md:flex-none px-5 py-3 rounded-xl font-black text-xs bg-slate-100 text-slate-600 border border-slate-200 hover:bg-slate-200 transition-all active:scale-95">查看詳情</button>
                                                        <button
                                                            onClick={() => handleImmediateIdentify(law.id)}
                                                            className={`flex-1 md:flex-none px-8 py-3 rounded-xl font-black text-xs text-white shadow-lg transition-all duration-200 transform hover:scale-105 active:scale-95 flex items-center justify-center ${status.code === 'danger' ? 'bg-rose-600 shadow-rose-600/20 hover:bg-rose-700 animate-pulse' : 'bg-blue-600 shadow-blue-600/20 hover:bg-blue-700'}`}
                                                        >
                                                            立即鑑別
                                                        </button>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            ) : (
                                <div className="fade-in space-y-6">
                                    <button onClick={() => setActiveTab('monitor')} className="back-nav-btn flex items-center gap-2 text-sm font-black text-slate-500 hover:text-blue-600 transition-all group">
                                        <i className="fas fa-chevron-left transition-transform group-hover:-translate-x-1"></i> 返回監控清單
                                    </button>
                                    <div className="bg-white rounded-[2.5rem] shadow-xl border border-slate-200 overflow-hidden workbench-card">
                                        <div className="print-header">
                                            <h1 style={{fontSize: '24pt', fontWeight: '900'}}>{selectedLaw?.name} - 合規性鑑別報告</h1>
                                            <p>鑑別日期：{TODAY.toISOString().split('T')[0]} | 狀態：{getLawStatus(selectedLaw?.remoteDate, selectedLaw?.localCheckDate).text}</p>
                                        </div>
                                        <div className="p-10 border-b border-slate-100 bg-slate-50/50">
                                            <div className="flex flex-col md:flex-row justify-between items-start md:items-end gap-6">
                                                <div className="space-y-4">
                                                    <div className="inline-flex items-center gap-2 bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-[10px] font-black uppercase">
                                                        <i className="fas fa-microchip"></i> 鑑別工作台
                                                    </div>
                                                    <h2 className="text-3xl font-black text-slate-800 tracking-tight leading-tight">{selectedLaw?.name}</h2>
                                                </div>
                                                <div className="flex gap-3 action-buttons">
                                                    <button onClick={() => window.print()} className="px-6 py-3 rounded-xl bg-white border border-slate-200 text-slate-600 font-black text-sm transition-all hover:bg-slate-50 active:scale-95">
                                                        <i className="fas fa-print mr-2"></i> 列印報告
                                                    </button>
                                                    <button
                                                        onClick={() => {
                                                            handleImmediateIdentify(selectedLaw.id);
                                                            setActiveTab('monitor');
                                                        }}
                                                        className="px-6 py-3 rounded-xl bg-blue-600 text-white font-black text-sm shadow-lg hover:bg-blue-700 transition-all active:scale-95"
                                                    >
                                                        立即鑑別並更新
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                        <div className="p-10 bg-white">
                                            <div className="space-y-6">
                                                <h3 className="text-xl font-black text-slate-800 flex items-center gap-2">
                                                    <i className="fas fa-list-check text-blue-500"></i> 新舊條文對照表
                                                </h3>
                                                <div className="overflow-hidden border border-slate-200 rounded-2xl">
                                                    <table className="w-full text-left border-collapse">
                                                        <thead>
                                                            <tr className="bg-slate-50 border-b border-slate-200">
                                                                <th className="p-4 text-[10px] font-black text-slate-400 uppercase tracking-widest w-24">條號</th>
                                                                <th className="p-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">舊版條文內容</th>
                                                                <th className="p-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">新版條文內容</th>
                                                                <th className="p-4 text-[10px] font-black text-slate-400 uppercase tracking-widest w-32">變更說明</th>
                                                            </tr>
                                                        </thead>
                                                        <tbody className="divide-y divide-slate-100">
                                                            {diffData.map((item, idx) => (
                                                                <tr key={idx} className="hover:bg-slate-50/50 transition-colors">
                                                                    <td className="p-4 font-black text-slate-700 text-sm align-top">{item.article}</td>
                                                                    <td className="p-4 text-sm text-slate-500 leading-relaxed align-top italic" dangerouslySetInnerHTML={{__html: item.old}}></td>
                                                                    <td className="p-4 text-sm text-slate-800 font-medium leading-relaxed align-top" dangerouslySetInnerHTML={{__html: item.new}}></td>
                                                                    <td className="p-4 align-top">
                                                                        <span className="text-[10px] font-black bg-blue-50 text-blue-600 px-2 py-1 rounded border border-blue-100">{item.note}</span>
                                                                    </td>
                                                                </tr>
                                                            ))}
                                                        </tbody>
                                                    </table>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>

                    <div className="developer-tag opacity-60 hover:opacity-100 transition-opacity">
                        <div className="bg-slate-900/90 backdrop-blur-md text-white px-4 py-2 rounded-2xl shadow-2xl flex items-center gap-3 border border-white/10">
                            <div className="w-2 h-2 bg-emerald-400 rounded-full shadow-[0_0_8px_rgba(52,211,153,0.8)] animate-pulse"></div>
                            <span className="text-[10px] font-black tracking-widest uppercase">System Developer By Sam Sun</span>
                        </div>
                    </div>

                    <footer className="px-8 py-3 bg-white border-t border-slate-200 flex justify-between items-center text-[9px] font-black text-slate-400 uppercase tracking-widest">
                        <div className="flex items-center gap-4">
                            <span>資料來源：全國法規資料庫 API</span>
                            <span className="text-slate-200">|</span>
                            <span>已配置：ISO 45001 符合性鑑別模組</span>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
